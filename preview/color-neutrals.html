<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Neutrals" subtitle="The real palette — surface, canvas, borders, text" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: var(--s5); }
  .row { display:flex; gap: var(--s3); width:100%; }
  .tok { display:flex; flex-direction:column; gap:6px; flex:1; min-width:0; }
  .chip { height: 56px; border-radius: var(--radius); border: 1px solid var(--border); }
  .name { font-size: 11px; font-weight: 600; color: var(--text); }
  .var { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style></head><body>
<div class="row">
  <div class="tok"><div class="chip" style="background:#FFFFFF"></div><div class="name">Surface</div><div class="var">--bg</div><div class="hex">#FFFFFF</div></div>
  <div class="tok"><div class="chip" style="background:#FAFBFC"></div><div class="name">Canvas</div><div class="var">--canvas</div><div class="hex">#FAFBFC</div></div>
  <div class="tok"><div class="chip" style="background:#E4E7EC"></div><div class="name">Border</div><div class="var">--border</div><div class="hex">#E4E7EC</div></div>
  <div class="tok"><div class="chip" style="background:#D0D5DD"></div><div class="name">Border strong</div><div class="var">--border-strong</div><div class="hex">#D0D5DD</div></div>
  <div class="tok"><div class="chip" style="background:#98A2B3"></div><div class="name">Text muted</div><div class="var">--text-muted</div><div class="hex">#98A2B3</div></div>
  <div class="tok"><div class="chip" style="background:#475467"></div><div class="name">Text 2nd</div><div class="var">--text-secondary</div><div class="hex">#475467</div></div>
  <div class="tok"><div class="chip" style="background:#1D2939"></div><div class="name">Text</div><div class="var">--text</div><div class="hex">#1D2939</div></div>
</div></body></html>
