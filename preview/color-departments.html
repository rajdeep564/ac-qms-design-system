<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Departments" subtitle="QC green and QA blue — the only standing identity colors" viewport="700x150" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: var(--s5); flex-direction: column; align-items: stretch; gap: var(--s4); }
  .row { display: flex; gap: var(--s4); }
  .tok { display: flex; flex-direction: column; gap: var(--s2); flex: 1; }
  .chip { height: 48px; border-radius: var(--radius); border: 1px solid var(--border); display: flex; align-items: center; padding: 0 var(--s3); }
  .name { font-size: var(--text-xs); font-weight: 600; color: var(--text); }
  .var { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .badge { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
</style></head><body>
<div class="row" style="width:100%">
  <div class="tok"><div class="chip" style="background:#2E7D32"><span class="badge" style="color:#2E7D32;background:#EDF5EE">QC</span></div>
    <div class="name">QC green</div><div class="var">--qc · --qc-soft</div></div>
  <div class="tok"><div class="chip" style="background:#1565C0"><span class="badge" style="color:#1565C0;background:#EAF1FB">QA</span></div>
    <div class="name">QA blue</div><div class="var">--qa · --qa-soft</div></div>
</div></body></html>
