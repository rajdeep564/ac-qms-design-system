<!doctype html>

<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">

  body { padding: var(--s5); flex-direction:column; align-items:stretch; gap: var(--s3); }

  .field { flex: 1; min-width: 0; }

<div class="row">

  </div>
  <div class="field">
    <span class="field-label">Assay result (%)</span>
    <input class="input" value="99.74" />

  </div>
  <div class="field">
    <span class="field-label">Lot number</span>
    <input class="input input--error" value="" placeholder="Required" />

  </div>
</div>
