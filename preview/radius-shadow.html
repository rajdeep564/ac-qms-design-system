<!doctype html>
<!-- @dsCard group="Spacing" name="Radius & elevation" subtitle="Two radii, two shadows — no puffy cards" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: var(--s5); background: var(--canvas); gap: var(--s5); }
  .row { display:flex; gap: var(--s4); width:100%; }
  .tok { display:flex; flex-direction:column; gap: var(--s2); flex:1; align-items:flex-start; }
  .box { background: var(--bg); border: 1px solid var(--border); width: 96px; height: 60px; }
  .var { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .name { font-size: 11px; font-weight: 600; color: var(--text); }
  .note { font-size: 11px; color: var(--text-muted); }
</style></head><body>
<div class="row">
  <div class="tok"><div class="box" style="border-radius:4px"></div>
    <span class="name">--radius-sm</span><span class="var">4 px</span><span class="note">pills, badges, table cells</span></div>
  <div class="tok"><div class="box" style="border-radius:6px"></div>
    <span class="name">--radius</span><span class="var">6 px</span><span class="note">cards, modals, buttons</span></div>
  <div class="tok"><div class="box" style="border-radius:6px;box-shadow:0 1px 2px rgba(16,24,40,0.04)"></div>
    <span class="name">--shadow-sm</span><span class="var">0 1px 2px /04</span><span class="note">focus rings only</span></div>
  <div class="tok"><div class="box" style="border-radius:6px;box-shadow:0 1px 3px rgba(16,24,40,0.06)"></div>
    <span class="name">--shadow</span><span class="var">0 1px 3px /06</span><span class="note">popovers — the maximum</span></div>
</div></body></html>
