<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Lock-up" subtitle="Aditya Chemicals corporate mark on light + dark" viewport="700x150" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: var(--canvas); }
  .wrap { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .panel { background: var(--bg); padding: var(--s5) var(--s6); display: flex; align-items: center; gap: var(--s4); min-height: 150px; }
  .panel.dark { background: #1D2939; }
  .panel img { height: 36px; display: block; }
  .panel .label { font-size: var(--text-xs); color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
  .panel.dark .label { color: #98A2B3; }
  .col { display: flex; flex-direction: column; gap: var(--s2); }
  .name { font-weight: 600; font-size: var(--text-sm); color: var(--text); }
  .panel.dark .name { color: #fff; }
</style></head><body>
<div class="wrap">
  <div class="panel">
    <img src="../assets/aditya-chemicals-logo.png" alt="Aditya Chemicals">
    <div class="col">
      <span class="label">On white</span>
      <span class="name">Corporate lock-up</span>
    </div>
  </div>
  <div class="panel dark">
    <img src="../assets/aditya-chemicals-logo.png" alt="Aditya Chemicals" style="filter: brightness(0) invert(1);">
    <div class="col">
      <span class="label">On dark (rare)</span>
      <span class="name">Inverted</span>
    </div>
  </div>
</div></body></html>
