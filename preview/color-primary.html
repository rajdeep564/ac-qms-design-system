<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Primary (teal)" subtitle="The one accent — used for primary CTA and active nav only" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: var(--s5); }
  .row { display: flex; gap: var(--s4); width: 100%; }
  .tok { display: flex; flex-direction: column; gap: var(--s2); flex: 1; min-width: 0; }
  .chip { height: 64px; border-radius: var(--radius); border: 1px solid var(--border); }
  .name { font-size: var(--text-xs); font-weight: 600; color: var(--text); }
  .var { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .role { font-size: 11px; color: var(--text-secondary); }
</style></head><body>
<div class="row">
  <div class="tok"><div class="chip" style="background:#0F5560"></div>
    <div class="name">Primary</div><div class="var">--primary</div><div class="hex">#0F5560</div>
    <div class="role">CTA, active nav</div></div>
  <div class="tok"><div class="chip" style="background:#0A434C"></div>
    <div class="name">Primary hover</div><div class="var">--primary-hover</div><div class="hex">#0A434C</div>
    <div class="role">CTA hover state</div></div>
  <div class="tok"><div class="chip" style="background:#EAF1F2"></div>
    <div class="name">Primary soft</div><div class="var">--primary-soft</div><div class="hex">#EAF1F2</div>
    <div class="role">Selected row, active bg</div></div>
</div></body></html>
