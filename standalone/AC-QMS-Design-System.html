  <title>AC-QMS Design System</title>
  <style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>AC-QMS Design System<\u002Ftitle>\n  <style>/* ============================================================\n   AC-QMS DESIGN TOKENS (Clinical)\n   Aditya Chemicals — Quality Management System\n   ============================================================\n   Visual language: clean, clinical, pharma-regulated.\n   Color is FUNCTIONAL ONLY — department, status, or danger.\n   White cards on near-white canvas, hairline borders, no shadows.\n   ============================================================ */\n\n:root {\n  /* ---------- Brand ----------\n     Single restrained teal, used sparingly for primary actions only.\n     The Aditya Chemicals corporate logo (purple) is brand identity;\n     in-product UI never uses the corporate purple as an accent. */\n  --primary:        #0F5560;  /* deep muted teal — primary buttons, active nav */\n  --primary-hover:  #0A434C;\n  --primary-soft:   #EAF1F2;  /* faint teal tint for selected rows / active bg */\n\n  /* ---------- Departments ----------\n     The ONLY standing identity colors. Kept muted, badge-only. */\n  --qc:             #2E7D32;  /* QC green */\n  --qc-soft:        #EDF5EE;\n  --qa:             #1565C0;  /* QA blue  */\n  --qa-soft:        #EAF1FB;\n\n  /* ---------- Status ----------\n     Desaturated. Communicate state, not excitement.\n     Pills: soft tinted background + solid colored text. */\n  --draft:          #6B7280;  --draft-soft:     #F3F4F6;\n  --submitted:      #92710A;  --submitted-soft: #FAF6EC;\n  --approved:       #2E7D32;  --approved-soft:  #EDF5EE;\n  --signed:         #1565C0;  --signed-soft:    #EAF1FB;\n  --issued:         #0F5560;  --issued-soft:    #EAF1F2;\n  --oos:            #B42318;  --oos-soft:       #FBEAE8;  /* danger only */\n\n  /* ---------- Neutrals (the real palette) ---------- */\n  --bg:             #FFFFFF;  /* cards, inputs, modals */\n  --canvas:         #FAFBFC;  /* page background behind cards */\n  --border:         #E4E7EC;  /* hairlines, dividers, input borders */\n  --border-strong:  #D0D5DD;\n  --text:           #1D2939;  /* primary text */\n  --text-secondary: #475467;  /* labels, secondary */\n  --text-muted:     #98A2B3;  /* placeholders, meta */\n\n  /* ---------- Type ----------\n     One neutral family. Base 14px — clinical tools run compact. */\n  --font: 'Inter', system-ui, 'Segoe UI', Arial, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  --text-xs:   12px;\n  --text-sm:   13px;\n  --text-base: 14px;\n  --text-md:   16px;\n  --text-lg:   18px;\n  --text-xl:   22px;\n  --text-2xl:  28px;\n\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  --leading-tight:  1.25;\n  --leading-normal: 1.45;\n  --leading-loose:  1.6;\n\n  /* ---------- Spacing (strict 4/8px grid) ---------- */\n  --s1:  4px;\n  --s2:  8px;\n  --s3:  12px;\n  --s4:  16px;\n  --s5:  20px;\n  --s6:  24px;\n  --s8:  32px;\n  --s10: 40px;\n\n  /* ---------- Radius & elevation ----------\n     Minimal — no soft puffy cards. */\n  --radius:    6px;\n  --radius-sm: 4px;\n\n  --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.04);\n  --shadow:    0 1px 3px rgba(16, 24, 40, 0.06);  /* max — no big drops */\n}\n\n/* ============================================================\n   Semantic type classes\n   Hierarchy comes from weight + spacing, NOT color or size jumps.\n   ============================================================ */\n\nhtml, body {\n  font-family: var(--font);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--text);\n  background: var(--canvas);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.t-page-title {\n  font-size: var(--text-2xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  letter-spacing: -0.01em;\n  color: var(--text);\n}\n\n.t-section-title {\n  font-size: var(--text-xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  color: var(--text);\n}\n\n.t-card-title {\n  font-size: var(--text-md);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  color: var(--text);\n}\n\n.t-body {\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  color: var(--text);\n}\n\n.t-secondary {\n  font-size: var(--text-sm);\n  color: var(--text-secondary);\n}\n\n.t-meta {\n  font-size: var(--text-xs);\n  color: var(--text-muted);\n  letter-spacing: 0.01em;\n}\n\n.t-label {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-medium);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  color: var(--text-secondary);\n}\n\n.t-mono {\n  font-family: var(--font-mono);\n  font-size: var(--text-sm);\n  color: var(--text);\n}\n\n.t-numeric {\n  font-variant-numeric: tabular-nums;\n}\n<\u002Fstyle>\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n  <style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a9bce777-d108-4f46-b940-213a6bac1793\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"14f6cc80-879c-4a32-8d1c-2e3c0a6e22cc\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f1d77ea9-985e-49ba-8ac9-e56b1756711c\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-  U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>* { box-sizing: border-box; margin: 0; padding: 0; }\nbody {\n  font-family: var(--font);\n  color: var(--text);\n  background: #5b626d;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- Page model: landscape A4 ---------- */\n.page {\n  width: 297mm;\n  height: 210mm;\n  background: var(--bg);\n  margin: 16px auto;\n  padding: 15mm 18mm;\n  position: relative;\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n}\n\n/* Running head / foot */\n.runner {\n  display: flex; align-items: center; justify-content: space-between;\n  font-size: 10px;\n  color: var(--text-muted);\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  font-weight: 500;\n  flex-shrink: 0;\n}\n.runner.top { border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 14px; }\n.runner.bot { border-top: 1px solid var(--border); padding-top: 8px; margin-top: auto; }\n.runner .mono { font-family: var(--font-mono); text-transform: none; letter-spacing: 0.02em; }\n.runner .brand { display: inline-flex; align-items: center; gap: 8px; }\n.runner .brand b { color: var(--primary); font-weight: 600; letter-spacing: 0.02em; }\n.runner .brand .sep { color: var(--text-muted); font-weight: 400; }\n\n.page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; color: var(--text); line-height: 1.15; }\n.page-sub { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; max-width: 76ch; }\n.section-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }\n.content { flex: 1; min-height: 0; padding-top: 16px; }\n\n/* ---------- Cover ---------- */\n.cover { justify-content: space-between; padding: 24mm; }\n.cover .top-mark { display: flex; align-items: center; gap: 14px; }\n.cover .top-mark img { height: 30px; }\n.cover .top-mark .pname { font-size: 16px; font-weight: 600; color: var(--primary); letter-spacing: 0.02em; }\n.cover .top-mark .pname .sep { color: var(--text-muted); font-weight: 400; margin: 0 4px; }\n.cover h1 { font-size: 60px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.02; color: var(--text); }\n.cover .lede { font-size: 16px; color: var(--text-secondary); line-height: 1.55; max-width: 62ch; margin-top: 18px; }\n.cover .swatch-strip { display: flex; gap: 0; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 22px; max-width: 360px; }\n.cover .swatch-strip span { flex: 1; }\n.cover .cover-meta { display: flex; gap: 44px; border-top: 1px solid var(--border); padding-top: 18px; }\n.cover .cover-meta .item .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; }\n.cover .cover-meta .item .v { font-size: 13px; color: var(--text); margin-top: 4px; font-variant-numeric: tabular-nums; }\n.cover .cover-meta .item .v.mono { font-family: var(--font-mono); }\n\n/* ---------- Layout helpers ---------- */\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }\n.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }\n.col { display: flex; flex-direction: column; gap: 22px; }\n.panel { border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; gap: 14px; }\n.panel--canvas { background: var(--canvas); }\n.panel-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }\n.panel-label .note { font-weight: 400; color: var(--text-muted); font-size: 10px; letter-spacing: 0.02em; text-align: right; }\n\n/* Color tokens */\n.tok-row { display: flex; gap: 12px; }\n.tok { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 0; }\n.tok .chip { height: 44px; border-radius: var(--radius-sm); border: 1px solid var(--border); }\n.tok .name { font-size: 11px; font-weight: 600; color: var(--text); }\n.tok .var { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }\n.tok .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }\n.tok .role { font-size: 10px; color: var(--text-secondary); line-height: 1.3; }\n\n/* Pills */\n.pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; line-height: 16px; }\n.pill--draft { color: var(--draft); background: var(--draft-soft); }\n.pill--submitted { color: var(--submitted); background: var(--submitted-soft); }\n.pill--approved { color: var(--approved); background: var(--approved-soft); }\n.pill--signed { color: var(--signed); background: var(--signed-soft); }\n.pill--issued { color: var(--issued); background: var(--issued-soft); }\n.pill--oos { color: var(--oos); background: var(--oos-soft); }\n.pill--qc { color: var(--qc); background: var(--qc-soft); }\n.pill--qa { color: var(--qa); background: var(--qa-soft); }\n.pill-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }\n\n/* Type specimens */\n.type-row { display: grid; grid-template-columns: 92px 1fr 92px; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); }\n.type-row:last-child { border-bottom: none; }\n.type-row .var { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }\n.type-row .spec { color: var(--text); font-weight: 500; }\n.type-row .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: right; }\n.weights { display: flex; gap: 22px; align-items: baseline; }\n.weights .w { display: flex; flex-direction: column; gap: 2px; }\n.weights .glyph { font-size: 22px; color: var(--text); }\n.weights .lbl { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }\n\n/* Spacing */\n.sbar-row { display: flex; align-items: center; gap: 14px; padding: 4px 0; }\n.sbar-row .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); width: 52px; }\n.sbar-row .bar { background: var(--primary); height: 8px; border-radius: 2px; }\n.sbar-row .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 36px; text-align: right; }\n.radius-demo { display: flex; gap: 16px; }\n.radius-demo .r { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; flex: 1; }\n.radius-demo .box { background: var(--bg); border: 1px solid var(--border); width: 100%; height: 46px; }\n.radius-demo .cap { font-size: 10px; color: var(--text-secondary); }\n.radius-demo .cap b { font-family: var(--font-mono); color: var(--text); font-weight: 500; }\n.elev-demo { display: flex; gap: 16px; }\n.elev-demo .e { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; flex: 1; }\n.elev-demo .box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; height: 46px; }\n\n/* Buttons */\n.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 34px; padding: 0 14px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 500; line-height: 1; border: 1px solid transparent; }\n.btn--primary { background: var(--primary); color: #fff; }\n.btn--neutral { background: var(--bg); color: var(--text); border-color: var(--border-strong); }\n.btn--ghost { background: transparent; color: var(--text); }\n.btn--danger { background: var(--bg); color: var(--oos); border-color: var(--border-strong); }\n.btn--disabled { opacity: 0.5; }\n.btn .ico { width: 14px; height: 14px; }\n.btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }\n\n/* Inputs */\n.field { display: flex; flex-direction: column; gap: 5px; }\n.field-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); }\n.input { height: 34px; padding: 0 12px; font-family: var(--font); font-size: 13px; color: var(--text); background: var(--bg); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); width: 100%; display: flex; align-items: center; }\n.input--focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(15,85,96,0.18); }\n.input--error { border-color: var(--oos); }\n.help { font-size: 10px; color: var(--text-muted); }\n.help--err { color: var(--oos); }\n\n/* Mini table */\ntable.mini { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }\ntable.mini th { background: var(--canvas); color: var(--text-secondary); font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }\ntable.mini th.num { text-align: right; }\ntable.mini td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }\ntable.mini tr:last-child td { border-bottom: none; }\ntable.mini tr.sel td { background: var(--primary-soft); }\ntable.mini td.id { font-family: var(--font-mono); font-weight: 500; }\ntable.mini td.num { text-align: right; }\n\n/* Icon grid */\n.icon-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }\n.icon-cell { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 12px 6px; border: 1px solid var(--border); border-radius: var(--radius-sm); }\n.icon-cell svg { width: 20px; height: 20px; color: var(--text); }\n.icon-cell .nm { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); text-align: center; }\n\n/* Principles / do-dont */\n.principles { display: flex; flex-direction: column; gap: 12px; }\n.principle { display: grid; grid-template-columns: 22px 1fr; gap: 12px; align-items: start; }\n.principle .n { font-family: var(--font-mono); font-size: 12px; color: var(--primary); font-weight: 600; padding-top: 1px; }\n.principle .h { font-size: 13px; font-weight: 600; color: var(--text); }\n.principle .d { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-top: 2px; }\n.principle .d code { font-family: var(--font-mono); font-size: 11px; background: var(--canvas); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; color: var(--text); }\n.dd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n.dd { padding: 10px 12px; border-radius: var(--radius-sm); font-size: 12px; line-height: 1.45; }\n.dd .tag { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; display: block; margin-bottom: 4px; }\n.dd.do { background: var(--approved-soft); }\n.dd.do .tag { color: var(--approved); }\n.dd.dont { background: var(--oos-soft); }\n.dd.dont .tag { color: var(--oos); }\n\n/* Screen showcase pages */\n.screen-page { padding: 0; }\n.screen-head { padding: 12mm 14mm 0; display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; flex-shrink: 0; }\n.screen-head .meta { text-align: right; }\n.screen-head .meta .num { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }\n.cap-title { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }\n.cap-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-top: 4px; max-width: 70ch; }\n.chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; margin-top: 8px; }\n.chip-tag { font-size: 10px; color: var(--text-secondary); border: 1px solid var(--border); background: var(--canvas); border-radius: 999px; padding: 3px 9px; font-weight: 500; }\n.screen-stage { flex: 1; margin: 14px 14mm 12mm; background: var(--canvas); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 0; }\n.screen-stage img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }\n.screen-stage.pad { padding: 18px; }\n.screen-duo { flex: 1; margin: 14px 14mm 12mm; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; min-height: 0; }\n.screen-duo .cell { display: flex; flex-direction: column; gap: 8px; min-height: 0; }\n.screen-duo .frame { flex: 1; background: var(--canvas); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 0; padding: 12px; }\n.screen-duo .frame img { max-width: 100%; max-height: 100%; object-fit: contain; }\n.screen-duo .cap { display: flex; align-items: baseline; gap: 8px; }\n.screen-duo .cap .num { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }\n.screen-duo .cap .t { font-size: 13px; font-weight: 600; color: var(--text); }\n.screen-duo .cap .d { font-size: 11px; color: var(--text-secondary); }\n\n/* Closing */\n.closing { justify-content: center; gap: 18px; }\n.closing .rules { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 8px; max-width: 900px; }\n.closing .rule { border: 1px solid var(--border); border-left: 3px solid var(--primary); border-radius: var(--radius-sm); padding: 18px 20px; }\n.closing .rule.danger { border-left-color: var(--oos); }\n.closing .rule h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }\n.closing .rule p { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }\n.closing .manifest { display: flex; gap: 40px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }\n.closing .manifest .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }\n.closing .manifest .v { font-size: 12px; color: var(--text); font-family: var(--font-mono); line-height: 1.7; }\n\n/* ---------- PRINT ---------- */\n@media print {\n  @page { size: A4 landscape; margin: 0; }\n  body { background: #fff; }\n  .page {\n    margin: 0; width: 100%; height: 100vh;\n    page-break-after: always; break-after: page;\n    -webkit-print-color-adjust: exact; print-color-adjust: exact;\n  }\n  .page:last-child { page-break-after: auto; break-after: auto; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <!-- ============ COVER ============ -->\n  <section class=\"page cover\">\n    <div class=\"top-mark\">\n      <img src=\"2ed16e8c-35a9-4c3d-b6f2-776169a97b4c\" alt=\"Aditya Chemicals\">\n      <span class=\"pname\">AC<span class=\"sep\">·<\u002Fspan>QMS<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      <div class=\"section-eyebrow\">Design System · Clinical<\u002Fdiv>\n      <h1>AC-QMS<br>Design System<\u002Fh1>\n      <p class=\"lede\">\n        The visual and interaction language for Aditya Chemicals' regulated Quality\n        Management System. Overwhelmingly white and neutral; color is functional only —\n        it signals department, document status, or out-of-specification danger. Built\n        for the restraint of a lab instrument readout: precise, calm, inspection-ready.\n      <\u002Fp>\n      <div class=\"swatch-strip\">\n        <span style=\"background:var(--primary)\"><\u002Fspan>\n        <span style=\"background:var(--qc)\"><\u002Fspan>\n        <span style=\"background:var(--qa)\"><\u002Fspan>\n        <span style=\"background:var(--submitted)\"><\u002Fspan>\n        <span style=\"background:var(--oos)\"><\u002Fspan>\n        <span style=\"background:var(--text)\"><\u002Fspan>\n        <span style=\"background:var(--border-strong)\"><\u002Fspan>\n        <span style=\"background:var(--canvas)\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cover-meta\">\n      <div class=\"item\"><div class=\"k\">Version<\u002Fdiv><div class=\"v mono\">1.0<\u002Fdiv><\u002Fdiv>\n e. Icons are Lucide line icons at 1.75 stroke, currentColor, paired with text labels in navigation.<\u002Fp>\n\n    <div class=\"content\" style=\"display:flex; flex-direction:column; gap:22px;\">\n      <div class=\"panel\">\n        <div class=\"panel-label\">Data table <span class=\"note\">ID left · status right · selected row in primary-soft<\u002Fspan><\u002Fdiv>\n        <table class=\"mini\">\n          <thead><tr><th>Document<\u002Fth><th>Title<\u002Fth><th>Dept<\u002Fth><th class=\"num\">Rev<\u002Fth><th>Status<\u002Fth><th>Last modified<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td class=\"id\">SPEC-API-0142<\u002Ftd><td>Acetaminophen API release spec<\u002Ftd><td><span class=\"pill pill--qc\">QC<\u002Fspan><\u002Ftd><td class=\"num\">r3<\u002Ftd><td><span class=\"pill pill--approved\">QC approved<\u002Fspan><\u002Ftd><td style=\"color:var(--text-secondary); font-family:var(--font-mono); font-size:11px;\">24-May-2026 14:02 IST<\u002Ftd><\u002Ftr>\n            <tr class=\"sel\"><td class=\"id\">BR-2026-04781<\u002Ftd><td>Batch record · Lot A4781<\u002Ftd><td><span class=\"pill pill--qa\">QA<\u002Fspan><\u002Ftd><td class=\"num\">r1<\u002Ftd><td><span class=\"pill pill--signed\">QA signed<\u002Fspan><\u002Ftd><td style=\"color:var(--text-secondary); font-family:var(--font-mono); font-size:11px;\">24-May-2026 11:48 IST<\u002Ftd><\u002Ftr>\n            <tr><td class=\"id\">OOS-2026-0089<\u002Ftd><td>Dissolution outside specification<\u002Ftd><td><span class=\"pill pill--qc\">QC<\u002Fspan><\u002Ftd><td class=\"num\">r0<\u002Ftd><td><span class=\"pill pill--oos\">OOS<\u002Fspan><\u002Ftd><td style=\"color:var(--text-secondary); font-family:var(--font-mono); font-size:11px;\">25-May-2026 09:14 IST<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"panel\">\n        <div class=\"panel-label\">Iconography <span class=\"note\">Lucide · 1.75 stroke · currentColor · 16px in chrome<\u002Fspan><\u002Fdiv>\n        <div class=\"icon-grid\">\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z\"><\u002Fpath><path d=\"M14 2v4a2 2 0 0 0 2 2h4\"><\u002Fpath><path d=\"M8 13h8\"><\u002Fpath><path d=\"M8 17h6\"><\u002Fpath><\u002Fsvg><span class=\"nm\">file-text<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7.5 4.27 9 5.15\"><\u002Fpath><path d=\"M21 8 12 13 3 8\"><\u002Fpath><path d=\"M21 8v8a2 2 0 0 1-1 1.73l-7 4a2 2 0 0 1-2 0l-7-4A2 2 0 0 1 3 16V8\"><\u002Fpath><path d=\"M12 22V12\"><\u002Fpath><\u002Fsvg><span class=\"nm\">package<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg><span class=\"nm\">triangle-alert<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg><span class=\"nm\">pen-line<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><span class=\"nm\">check<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><span class=\"nm\">search<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg><span class=\"nm\">user<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8\"><\u002Fpath><path d=\"M3 3v5h5\"><\u002Fpath><path d=\"M12 7v5l4 2\"><\u002Fpath><\u002Fsvg><span class=\"nm\">history<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"18\" height=\"11\" x=\"3\" y=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg><span class=\"nm\">lock<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9\"><\u002Fpath><path d=\"M10.3 21a1.94 1.94 0 0 0 3.4 0\"><\u002Fpath><\u002Fsvg><span class=\"nm\">bell<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg><span class=\"nm\">map-pin<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"9\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"5\"><\u002Frect><rect x=\"14\" y=\"12\" width=\"7\" height=\"9\"><\u002Frect><rect x=\"3\" y=\"16\" width=\"7\" height=\"5\"><\u002Frect><\u002Fsvg><span class=\"nm\">dashboard<\u002Fspan><\u002Fdiv>\n          <div class=\"icon-cell\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><span class=\"nm\">x<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:11px; color:var(--text-muted); line-height:1.5;\">No emoji, ever. No Unicode pictographs as iconography. Status is conveyed by the pill component, not a glyph.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"runner bot\"><span>Aditya Chemicals · Quality Management System<\u002Fspan><span class=\"mono\">Tabular product · IDs in mono<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ VOICE ============ -->\n  <section class=\"page\">\n    <div class=\"runner top\">\n      <span class=\"brand\"><b>AC·QMS<\u002Fb><span class=\"sep\">/<\u002Fspan>Content<\u002Fspan>\n      <span class=\"mono\">06 · Voice<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"section-eyebrow\">Content fundamentals<\u002Fdiv>\n    <div class=\"page-title\">Voice — exact, brief, without affect<\u002Fdiv>\n    <p class=\"page-sub\">The product reads the way a calibrated balance reads. No marketing voice, no encouragement, no exclamation. Imperative for actions, past tense for log entries, sentence case for chrome, ALL CAPS only for pills and badges.<\u002Fp>\n\n    <div class=\"content grid-2\">\n      <div class=\"panel\">\n        <div class=\"panel-label\">Principles<\u002Fdiv>\n        <div class=\"principles\">\n          <div class=\"principle\"><span class=\"n\">01<\u002Fspan><div><div class=\"h\">Sentence case in chrome<\u002Fdiv><div class=\"d\">Buttons, tabs, menus, headers. \"Submit for QA review\" — never Title Case.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"principle\"><span class=\"n\">02<\u002Fspan><div><div class=\"h\">ALL CAPS for state<\u002Fdiv><div class=\"d\">Status pills, department badges, document codes. \"DRAFT\", \"QC\", \"OOS\".<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"principle\"><span class=\"n\">03<\u002Fspan><div><div class=\"h\">Exact dates<\u002Fdiv><div class=\"d\"><code>DD-MMM-YYYY<\u002Fcode> + 24-hour time + timezone. \"24-May-2026 14:02 IST\".<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"principle\"><span class=\"n\">04<\u002Fspan><div><div class=\"h\">Units always<\u002Fdiv><div class=\"d\">Non-breaking space before the unit: \"99.7 %\", \"250 mg\". Specs use NLT / NMT.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"principle\"><span class=\"n\">05<\u002Fspan><div><div class=\"h\">No emoji, no exclamation<\u002Fdiv><div class=\"d\">A QMS does not congratulate the user. The OOS color is loud enough.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel\">\n        <div class=\"panel-label\">Write / avoid<\u002Fdiv>\n        <div class=\"dd-grid\">\n          <div class=\"dd do\"><span class=\"tag\">Write<\u002Fspan>Submitted to QA. Awaiting review.<\u002Fdiv>\n          <div class=\"dd dont\"><span class=\"tag\">Avoid<\u002Fspan>Awesome — sent for review!<\u002Fdiv>\n          <div class=\"dd do\"><span class=\"tag\">Write<\u002Fspan>Result outside specification. Investigation required (21 CFR 211.192).<\u002Fdiv>\n          <div class=\"dd dont\"><span class=\"tag\">Avoid<\u002Fspan>Uh oh — value out of range!<\u002Fdiv>\n          <div class=\"dd do\"><span class=\"tag\">Write<\u002Fspan>No deviations open.<\u002Fdiv>\n          <div class=\"dd dont\"><span class=\"tag\">Avoid<\u002Fspan>You're all caught up!<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"runner bot\"><span>Aditya Chemicals · Quality Management System<\u002Fspan><span class=\"mono\">First person never appears<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ UI KIT — SCREENS I (login + shell) ============ -->\n  <section class=\"page screen-page\">\n    <div class=\"screen-head\">\n      <div>\n        <div class=\"section-eyebrow\">UI Kit · The system in use<\u002Fdiv>\n        <div class=\"cap-title\">Sign in &amp; app shell<\u002Fdiv>\n        <div class=\"cap-desc\">Authentication and the chrome that wraps every screen. Centered login card with forced password-change and lockout states; fixed sidebar + breadcrumb top bar with active nav in primary-soft.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <span class=\"num\">07 · Screens I<\u002Fspan>\n        <div class=\"chips\"><span class=\"chip-tag\">Login<\u002Fspan><span class=\"chip-tag\">App shell<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-duo\">\n      <div class=\"cell\">\n        <div class=\"cap\"><span class=\"num\">01<\u002Fspan><span class=\"t\">Sign in<\u002Fspan><span class=\"d\">· forced change · lockout<\u002Fspan><\u002Fdiv>\n        <div class=\"frame\"><img src=\"9d11ca07-47fc-4024-acb6-21700d759660\" alt=\"Login screen\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"cap\"><span class=\"num\">02<\u002Fspan><span class=\"t\">App shell<\u002Fspan><span class=\"d\">· sidebar · breadcrumb<\u002Fspan><\u002Fdiv>\n        <div class=\"frame\"><img src=\"d31302d7-d746-4522-aed2-a9feca9eb003\" alt=\"App shell\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ UI KIT — SCREENS II (dashboard + notifications) ============ -->\n  <section class=\"page screen-page\">\n    <div class=\"screen-head\">\n      <div>\n        <div class=\"section-eyebrow\">UI Kit · The system in use<\u002Fdiv>\n        <div class=\"cap-title\">Dashboard &amp; notifications<\u002Fdiv>\n        <div class=\"cap-desc\">The reusable dashboard frame and the bell popover. Numbers stay neutral; only pills, badges, and the unread mark carry color. Restrained stats row — no colored tiles.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <span class=\"num\">08 · Screens II<\u002Fspan>\n        <div class=\"chips\"><span class=\"chip-tag\">Dashboard<\u002Fspan><span class=\"chip-tag\">Notifications<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-duo\">\n      <div class=\"cell\">\n        <div class=\"cap\"><span class=\"num\">03<\u002Fspan><span class=\"t\">Dashboard<\u002Fspan><span class=\"d\">· stats · pending · timeline<\u002Fspan><\u002Fdiv>\n        <div class=\"frame\"><img src=\"2d9f941c-ca97-44e9-b2ca-6a489922a174\" alt=\"Dashboard\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"cap\"><span class=\"num\">04<\u002Fspan><span class=\"t\">Notifications<\u002Fspan><span class=\"d\">· tabs · unread tint<\u002Fspan><\u002Fdiv>\n        <div class=\"frame\"><img src=\"e66927e2-b53a-4e18-91ed-04bfb4054c79\" alt=\"Notifications\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ UI KIT — SCREENS III (sign modal + workspace) ============ -->\n  <section class=\"page screen-page\">\n    <div class=\"screen-head\">\n      <div>\n        <div class=\"section-eyebrow\">UI Kit · The system in use<\u002Fdiv>\n        <div class=\"cap-title\">E-signature &amp; document workspace<\u002Fdiv>\n        <div class=\"cap-desc\">The regulated signing moment — reused for every approve, sign, and issue action — and the full document workspace with spec parameters, signatures, and audit trail.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <span class=\"num\">09 · Screens III<\u002Fspan>\n        <div class=\"chips\"><span class=\"chip-tag\">Sign modal<\u002Fspan><span class=\"chip-tag\">Workspace<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-duo\">\n      <div class=\"cell\">\n        <div class=\"cap\"><span class=\"num\">05<\u002Fspan><span class=\"t\">Sign &amp; approve modal<\u002Fspan><span class=\"d\">· 21 CFR Part 11<\u002Fspan><\u002Fdiv>\n        <div class=\"frame\"><img src=\"ae4d2ac0-89cb-4c09-a6d6-3b72031b528b\" alt=\"Sign modal\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell\">\n        <div class=\"cap\"><span class=\"num\">06<\u002Fspan><span class=\"t\">Document workspace<\u002Fspan><span class=\"d\">· spec · sigs · audit<\u002Fspan><\u002Fdiv>\n        <div class=\"frame\"><img src=\"2a33c9c7-e105-46f6-a833-f574c69fab61\" alt=\"Document workspace\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CLOSING ============ -->\n  <section class=\"page closing\">\n    <div style=\"display:flex; align-items:center; gap:12px;\">\n      <img src=\"2ed16e8c-35a9-4c3d-b6f2-776169a97b4c\" alt=\"Aditya Chemicals\" style=\"height:24px;\">\n      <span style=\"font-size:16px; font-weight:600; color:var(--primary);\">AC<span style=\"color:var(--text-muted); font-weight:400; margin:0 3px;\">·<\u002Fspan>QMS<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"section-eyebrow\" style=\"margin-top:18px;\">Above all<\u002Fdiv>\n    <div class=\"page-title\">Two rules hold the system together<\u002Fdiv>\n    <div class=\"rules\">\n      <div class=\"rule\"><h3>Color is functional only<\u002Fh3><p>Department, status, or danger — nothing decorative. The teal accent is the one button per view; OOS red is danger alone. No gradients, no vibrant accents, no playful color.<\u002Fp><\u002Fdiv>\n      <div class=\"rule danger\"><h3>Hairlines, not shadows<\u002Fh3><p>White cards on a near-white canvas, separated by 1px borders. The system should read as a lab instrument readout: precise, calm, inspection-ready.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"manifest\">\n      <div><div class=\"k\">Tokens<\u002Fdiv><div class=\"v\">colors_and_type.css<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Components<\u002Fdiv><div class=\"v\">ui_kits/ac_qms/<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Skill<\u002Fdiv><div class=\"v\">SKILL.md · README.md<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">Screens<\u002Fdiv><div class=\"v\">Login · Shell · Dashboard<br>Notifications · Sign modal<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"runner bot\" style=\"margin-top:32px;\"><span>Aditya Chemicals Ltd. — Internal design reference<\u002Fspan><span class=\"mono\">DS-AC-QMS · v1.0 · 29-May-2026<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PAGES_GO_HERE -->\n\n\n\n<\u002Fbody><\u002Fhtml>"
